spring:
  application:
    name: nfc-attendance-server

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:1234/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: disabled_default