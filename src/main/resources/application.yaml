spring:
  application:
    name: nfc-attendance-server

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:1234/presence_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration